<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiho Car</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

header h1 { color: #ffcc00; }

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* SEARCH */
.search-box {
  text-align: center;
  margin: 30px;
}

.search-box input {
  padding: 12px;
  width: 300px;
  border-radius: 30px;
  border: none;
}

/* GRID */
.cars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  padding: 40px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 500px;
  text-align: center;
}

.popup img {
  width: 100%;
  border-radius: 10px;
}

.close {
  margin-top: 10px;
  padding: 10px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}
.hero {
  text-align: center;
  margin: 50px 0;
}

</style>
</head>

<body>

<header>
  <h1>Fiho Car 🚗</h1>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="moto.html">دراجات</a>
  </nav>
</header>

<div class="search-box">
  <input type="search" id="search" placeholder="ابحث عن سيارة...">
</div>
<div class="hero">
  <h2>مرحبًا بك في Fiho Car!</h2>
</div>

<div class="cars" id="carsContainer"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <img id="popupImg">
    <h2 id="popupTitle"></h2>
    <p id="popupDesc"></p>
    <button class="close" onclick="closePopup()">إغلاق</button>
  </div>
</div>

<script>

// 🔥 Supabase
const supabaseUrl = "https://axqiulegpqrippdovtmd.supabase.co";
const supabaseKey = "sb_publishable_fRLnJeoJ8RNvqT2gCwgk3g_oPSjCU_M";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let allCars = [];

// 📦 جلب البيانات
async function loadCars() {
  const { data, error } = await supabase.from("cars").select("*");

  if (error) {
    console.error(error);
    return;
  }

  allCars = data;
  displayCars(data);
}

// 🎨 عرض
function displayCars(cars) {
  const container = document.getElementById("carsContainer");
  container.innerHTML = "";

  cars.forEach(car => {
    container.innerHTML += `
      <div class="card" onclick='openPopup(${JSON.stringify(car)})'>
        <img src="${car.image_url}">
        <div class="card-content">
          <h3>${car.name}</h3>
          <p>${car.description}</p>
        </div>
      </div>
    `;
  });
}

// 🔎 البحث
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = allCars.filter(car =>
    car.name.toLowerCase().includes(value)
  );
  displayCars(filtered);
});

// 📌 فتح Popup
function openPopup(car) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popupImg").src = car.image_url;
  document.getElementById("popupTitle").innerText = car.name;
  document.getElementById("popupDesc").innerText = car.description;
}

// ❌ إغلاق
function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// 🚀 تشغيل
loadCars();

</script>

</body>
</html>
