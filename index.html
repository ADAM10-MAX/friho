<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARAGE</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif;
}

body {
  color: white;
  overflow-x: hidden;
}

/* VIDEO BACKGROUND */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  filter: brightness(0.5);
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
  color: #ffcc00;
  font-size: 30px;
  letter-spacing: 2px;
}

nav a {
  color: white;
  margin-left: 25px;
  text-decoration: none;
  font-weight: bold;
  position: relative;
  transition: 0.3s;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #ffcc00;
  left: 0;
  bottom: -5px;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

nav a:hover {
  color: #ffcc00;
}

/* CENTER CONTENT */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

/* BUTTON */
.center-button {
  background: linear-gradient(45deg, #ffcc00, #ff8800);
  border: none;
  padding: 18px 45px;
  border-radius: 50px;
  font-size: 20px;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 0 20px rgba(255,204,0,0.6);
}

.center-button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px rgba(255,204,0,1);
}

/* TITLE */
.hero h2 {
  font-size: 50px;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.hero h2, .center-button {
  animation: fadeIn 1.5s ease;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bg-video">
  <source src="download.mp4" type="video/mp4">
</video>

<!-- HEADER -->
<header>
  <h1>GARAGE</h1>
  <nav>
    <a href="#">الرئيسية</a>
    <a href="#">Moto GP</a>
    <a href="#">الأكثر شهرة</a>
    <a href="CAR.html">Car Racing</a>
    <a href="#">تواصل معنا</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h2>مرحبا بك في عالم السرعة </h2>
  <button class="center-button">ابدأ استكشافك</button>
</div>

</body>
</html>
